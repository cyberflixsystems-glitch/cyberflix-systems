
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap');
  .wrap { background: #060a10; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 40px; }
  .logo-row { display: flex; align-items: center; gap: 18px; }
  .logo-text { display: flex; align-items: baseline; }
  .cyber { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; color: #00d4ff; letter-spacing: 2px; }
  .flix  { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; color: #ffffff; letter-spacing: 2px; }
  .llp   { font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600; color: #3a6080; letter-spacing: 4px; text-transform: uppercase; margin-left: 10px; align-self: center; }
  .label { font-family: 'Rajdhani', sans-serif; font-size: 11px; letter-spacing: 3px; color: #2a4060; text-transform: uppercase; }
  .divider { width: 100%; height: 1px; background: #1a2535; }
  .nav { display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 600px; background: #0d1520; border: 1px solid #1a2d42; border-radius: 10px; padding: 14px 24px; box-sizing: border-box; }
  .nav-links { display: flex; gap: 20px; }
  .nav-link { font-family: 'Rajdhani', sans-serif; font-size: 14px; color: #4a7090; }
  .nav-cta  { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: #00d4ff; border: 1px solid #00d4ff44; padding: 5px 14px; border-radius: 4px; }
</style>

<div class="wrap">

  <div class="label">Icon — exact recreation</div>

  <!-- MAIN LOGO ICON -->
  <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="160" height="160" fill="#060a10"/>

    <!-- Starfield dots -->
    <circle cx="20" cy="15" r="0.8" fill="#ffffff" opacity="0.4"/>
    <circle cx="140" cy="30" r="0.6" fill="#ffffff" opacity="0.3"/>
    <circle cx="10" cy="80" r="0.7" fill="#ffffff" opacity="0.35"/>
    <circle cx="150" cy="120" r="0.8" fill="#ffffff" opacity="0.3"/>
    <circle cx="55" cy="145" r="0.6" fill="#ffffff" opacity="0.25"/>
    <circle cx="130" cy="10" r="0.5" fill="#ffffff" opacity="0.4"/>
    <circle cx="30" cy="140" r="0.7" fill="#ffffff" opacity="0.3"/>

    <!-- Hexagon: flat-top, centered at 80,80, radius ~58 -->
    <!-- Vertices: top(80,22), top-right(130,51), bot-right(130,109), bot(80,138), bot-left(30,109), top-left(30,51) -->
    <polygon
      points="80,22 130,51 130,109 80,138 30,109 30,51"
      stroke="#1a8aaa"
      stroke-width="1.2"
      fill="none"
      opacity="0.85"
    />

    <!-- Diagonal lines inside hex (connecting opposite nodes through center) -->
    <line x1="80" y1="22" x2="80" y2="138" stroke="#1a8aaa" stroke-width="0.8" opacity="0.5"/>
    <line x1="130" y1="51" x2="30" y2="109" stroke="#1a8aaa" stroke-width="0.8" opacity="0.5"/>
    <line x1="130" y1="109" x2="30" y2="51" stroke="#1a8aaa" stroke-width="0.8" opacity="0.5"/>

    <!-- Node dots at each hex vertex -->
    <circle cx="80"  cy="22"  r="4" fill="#00bfdf" opacity="0.9"/>
    <circle cx="130" cy="51"  r="4" fill="#00bfdf" opacity="0.9"/>
    <circle cx="130" cy="109" r="4" fill="#00bfdf" opacity="0.9"/>
    <circle cx="80"  cy="138" r="4" fill="#00bfdf" opacity="0.9"/>
    <circle cx="30"  cy="109" r="4" fill="#00bfdf" opacity="0.9"/>
    <circle cx="30"  cy="51"  r="4" fill="#00bfdf" opacity="0.9"/>

    <!-- Bold white C arc — open on right side -->
    <!-- Circle center 80,80 radius 38, arc from ~40deg to ~320deg leaving gap on right -->
    <path
      d="M 110 54 A 38 38 0 1 0 110 106"
      stroke="#ffffff"
      stroke-width="9"
      stroke-linecap="round"
      fill="none"
    />

    <!-- Cyan play triangle pointing right, positioned in the C gap -->
    <polygon points="108,72 108,88 122,80" fill="#00c8f0"/>

  </svg>

  <div class="divider" style="max-width:400px;"/>

  <div class="label">Full logo — navbar size</div>

  <!-- NAVBAR VERSION -->
  <div class="logo-row">
    <svg width="52" height="52" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="160" height="160" fill="#060a10"/>
      <polygon points="80,22 130,51 130,109 80,138 30,109 30,51" stroke="#1a8aaa" stroke-width="1.2" fill="none" opacity="0.85"/>
      <line x1="80" y1="22" x2="80" y2="138" stroke="#1a8aaa" stroke-width="0.8" opacity="0.5"/>
      <line x1="130" y1="51" x2="30" y2="109" stroke="#1a8aaa" stroke-width="0.8" opacity="0.5"/>
      <line x1="130" y1="109" x2="30" y2="51" stroke="#1a8aaa" stroke-width="0.8" opacity="0.5"/>
      <circle cx="80"  cy="22"  r="4" fill="#00bfdf" opacity="0.9"/>
      <circle cx="130" cy="51"  r="4" fill="#00bfdf" opacity="0.9"/>
      <circle cx="130" cy="109" r="4" fill="#00bfdf" opacity="0.9"/>
      <circle cx="80"  cy="138" r="4" fill="#00bfdf" opacity="0.9"/>
      <circle cx="30"  cy="109" r="4" fill="#00bfdf" opacity="0.9"/>
      <circle cx="30"  cy="51"  r="4" fill="#00bfdf" opacity="0.9"/>
      <path d="M 110 54 A 38 38 0 1 0 110 106" stroke="#ffffff" stroke-width="9" stroke-linecap="round" fill="none"/>
      <polygon points="108,72 108,88 122,80" fill="#00c8f0"/>
    </svg>
    <div class="logo-text">
      <span class="cyber">Cyber</span><span class="flix">flix</span><span class="llp">Systems LLP</span>
    </div>
  </div>

  <div class="divider" style="max-width:400px;"/>

  <div class="label">Navbar in context</div>
  <div class="nav">
    <div class="logo-row">
      <svg width="38" height="38" viewBox="0 0 160 160" fill="none">
        <rect width="160" height="160" fill="#060a10"/>
        <polygon points="80,22 130,51 130,109 80,138 30,109 30,51" stroke="#1a8aaa" stroke-width="1.5" fill="none" opacity="0.85"/>
        <line x1="80" y1="22" x2="80" y2="138" stroke="#1a8aaa" stroke-width="1" opacity="0.5"/>
        <line x1="130" y1="51" x2="30" y2="109" stroke="#1a8aaa" stroke-width="1" opacity="0.5"/>
        <line x1="130" y1="109" x2="30" y2="51" stroke="#1a8aaa" stroke-width="1" opacity="0.5"/>
        <circle cx="80"  cy="22"  r="4" fill="#00bfdf"/>
        <circle cx="130" cy="51"  r="4" fill="#00bfdf"/>
        <circle cx="130" cy="109" r="4" fill="#00bfdf"/>
        <circle cx="80"  cy="138" r="4" fill="#00bfdf"/>
        <circle cx="30"  cy="109" r="4" fill="#00bfdf"/>
        <circle cx="30"  cy="51"  r="4" fill="#00bfdf"/>
        <path d="M 110 54 A 38 38 0 1 0 110 106" stroke="#ffffff" stroke-width="9" stroke-linecap="round" fill="none"/>
        <polygon points="108,72 108,88 122,80" fill="#00c8f0"/>
      </svg>
      <div class="logo-text">
        <span class="cyber" style="font-size:18px">Cyber</span><span class="flix" style="font-size:18px">flix</span><span class="llp" style="font-size:11px">Systems LLP</span>
      </div>
    </div>
    <div class="nav-links">
      <span class="nav-link">Services</span>
      <span class="nav-link">Products</span>
      <span class="nav-link">Partners</span>
    </div>
    <span class="nav-cta">Get Quote</span>
  </div>

</div>
